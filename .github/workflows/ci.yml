        - runtime: node
          task: test
          shard_index: 2
          shard_count: 6
          command: pnpm test
        - runtime: node
          task: test
          shard_index: 3
          shard_count: 6
          command: pnpm test
        - runtime: node
          task: test
          shard_index: 4
          shard_count: 6
          command: pnpm test
        - runtime: node
          task: test
          shard_index: 5
          shard_count: 6
