name: CI
true:
  push:
    branches:
    - main
  pull_request: null
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref
    }}
  cancel-in-progress: true
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
jobs:
  docs-scope:
    runs-on: blacksmith-16vcpu-ubuntu-2404
    outputs:
      docs_only: ${{ steps.check.outputs.docs_only }}
      docs_changed: ${{ steps.check.outputs.docs_changed }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 1
        fetch-tags: false
        submodules: false
    - name: Ensure docs-scope base commit
      uses: ./.github/actions/ensure-base-commit
      with:
        base-sha: ${{ github.event_name == 'push' && github.event.before || github.event.pull_request.base.sha
          }}
        fetch-ref: ${{ github.event_name == 'push' && github.ref_name || github.event.pull_request.base.ref
          }}
    - name: Detect docs-only changes
      id: check
      uses: ./.github/actions/detect-docs-changes
  changed-scope:
    needs:
    - docs-scope
    if: needs.docs-scope.outputs.docs_only != 'true'
    runs-on: blacksmith-16vcpu-ubuntu-2404
    outputs:
      run_node: ${{ steps.scope.outputs.run_node }}
      run_macos: ${{ steps.scope.outputs.run_macos }}
      run_android: ${{ steps.scope.outputs.run_android }}
      run_skills_python: ${{ steps.scope.outputs.run_skills_python }}
      run_windows: ${{ steps.scope.outputs.run_windows }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 1
        fetch-tags: false
        submodules: false
    - name: Ensure changed-scope base commit
      uses: ./.github/actions/ensure-base-commit
      with:
        base-sha: ${{ github.event_name == 'push' && github.event.before || github.event.pull_request.base.sha
          }}
        fetch-ref: ${{ github.event_name == 'push' && github.ref_name || github.event.pull_request.base.ref
          }}
    - name: Detect changed scopes
      id: scope
      shell: bash
      run: "set -euo pipefail\n\nif [ \"${{ github.event_name }}\" = \"push\" ]; then\n\
        \  BASE=\"${{ github.event.before }}\"\nelse\n  BASE=\"${{ github.event.pull_request.base.sha\
        \ }}\"\nfi\n\nnode scripts/ci-changed-scope.mjs --base \"$BASE\" --head HEAD\n"
  changed-extensions:
    needs:
    - docs-scope
    - changed-scope
    if: needs.docs-scope.outputs.docs_only != 'true' && needs.changed-scope.outputs.run_node
      == 'true'
    runs-on: blacksmith-16vcpu-ubuntu-2404
    outputs:
      has_changed_extensions: ${{ steps.changed.outputs.has_changed_extensions }}
      changed_extensions_matrix: ${{ steps.changed.outputs.changed_extensions_matrix
        }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 1
        fetch-tags: false
        submodules: false
    - name: Ensure changed-extensions base commit
      uses: ./.github/actions/ensure-base-commit
      with:
        base-sha: ${{ github.event_name == 'push' && github.event.before || github.event.pull_request.base.sha
          }}
        fetch-ref: ${{ github.event_name == 'push' && github.ref_name || github.event.pull_request.base.ref
          }}
    - name: Setup Node environment
      uses: ./.github/actions/setup-node-env
      with:
        install-bun: 'false'
        install-deps: 'false'
        use-sticky-disk: 'false'
    - name: Detect changed extensions
      id: changed
      env:
        BASE_SHA: ${{ github.event_name == 'push' && github.event.before || github.event.pull_request.base.sha
          }}
      run: 'node --input-type=module <<''EOF''

        import { appendFileSync } from "node:fs";

        import { listChangedExtensionIds } from "./scripts/test-extension.mjs";


        const extensionIds = listChangedExtensionIds({ base: process.env.BASE_SHA,
        head: "HEAD" });

        const matrix = JSON.stringify({ include: extensionIds.map((extension) => ({
        extension })) });


        appendFileSync(process.env.GITHUB_OUTPUT, `has_changed_extensions=${extensionIds.length
        > 0}\n`, "utf8");

        appendFileSync(process.env.GITHUB_OUTPUT, `changed_extensions_matrix=${matrix}\n`,
        "utf8");

        EOF

        '
  build-artifacts:
    needs:
    - docs-scope
    - changed-scope
    if: github.event_name == 'push' && needs.docs-scope.outputs.docs_only != 'true'
      && needs.changed-scope.outputs.run_node == 'true'
    runs-on: blacksmith-16vcpu-ubuntu-2404
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: false
    - name: Ensure secrets base commit (PR fast path)
      if: github.event_name == 'pull_request'
      uses: ./.github/actions/ensure-base-commit
      with:
        base-sha: ${{ github.event.pull_request.base.sha }}
        fetch-ref: ${{ github.event.pull_request.base.ref }}
    - name: Setup Node environment
      uses: ./.github/actions/setup-node-env
      with:
        install-bun: 'false'
        use-sticky-disk: 'false'
    - name: Build dist
      run: pnpm build
    - name: Upload dist artifact
      uses: actions/upload-artifact@v7
      with:
        name: dist-build
        path: dist/
        retention-days: 1
  release-check:
    needs:
    - docs-scope
    - build-artifacts
    if: github.event_name == 'push' && needs.docs-scope.outputs.docs_only != 'true'
    runs-on: blacksmith-16vcpu-ubuntu-2404
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: false
    - name: Setup Node environment
      uses: ./.github/actions/setup-node-env
      with:
        install-bun: 'false'
        use-sticky-disk: 'false'
    - name: Download dist artifact
      uses: actions/download-artifact@v8
      with:
        name: dist-build
        path: dist/
    - name: Check release contents
      run: pnpm release:check
  checks:
    needs:
    - docs-scope
    - changed-scope
    if: needs.docs-scope.outputs.docs_only != 'true' && needs.changed-scope.outputs.run_node
      == 'true'
    runs-on: blacksmith-16vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix:
        include:
        - runtime: node
          task: test
          shard_index: 1
          shard_count: 2
          command: pnpm canvas:a2ui:bundle && pnpm test
        - runtime: node
          task: test
          shard_index: 2
          shard_count: 2
          command: pnpm canvas:a2ui:bundle && pnpm test
        - runtime: node
          task: extensions
          command: pnpm test:extensions
        - runtime: node
          task: channels
          command: pnpm test:channels
        - runtime: node
          task: contracts
          command: pnpm test:contracts
        - runtime: node
          task: protocol
          command: pnpm protocol:check
        - runtime: bun
          task: test
          command: pnpm canvas:a2ui:bundle && bunx vitest run --config vitest.unit.config.ts
    steps:
    - name: Skip bun lane on pull requests
      if: github.event_name == 'pull_request' && matrix.runtime == 'bun'
      run: echo "Skipping Bun compatibility lane on pull requests."
    - name: Checkout
      if: github.event_name != 'pull_request' || matrix.runtime != 'bun'
      uses: actions/checkout@v6
      with:
        submodules: false
    - name: Setup Node environment
      if: matrix.runtime != 'bun' || github.event_name != 'pull_request'
      uses: ./.github/actions/setup-node-env
      with:
        install-bun: ${{ matrix.runtime == 'bun' }}
        use-sticky-disk: 'false'
    - name: Configure Node test resources
      if: (github.event_name != 'pull_request' || matrix.runtime != 'bun') && matrix.task
        == 'test' && matrix.runtime == 'node'
      env:
        SHARD_COUNT: ${{ matrix.shard_count || '' }}
        SHARD_INDEX: ${{ matrix.shard_index || '' }}
      run: "# `pnpm test` runs `scripts/test-parallel.mjs`, which spawns multiple\
        \ Node processes.\n# Default heap limits have been too low on Linux CI (V8\
        \ OOM near 4GB).\necho \"OPENCLAW_TEST_WORKERS=2\" >> \"$GITHUB_ENV\"\necho\
        \ \"OPENCLAW_TEST_MAX_OLD_SPACE_SIZE_MB=6144\" >> \"$GITHUB_ENV\"\nif [ -n\
        \ \"$SHARD_COUNT\" ] && [ -n \"$SHARD_INDEX\" ]; then\n  echo \"OPENCLAW_TEST_SHARDS=$SHARD_COUNT\"\
        \ >> \"$GITHUB_ENV\"\n  echo \"OPENCLAW_TEST_SHARD_INDEX=$SHARD_INDEX\" >>\
        \ \"$GITHUB_ENV\"\nfi\n"
    - name: Run ${{ matrix.task }} (${{ matrix.runtime }})
      if: matrix.runtime != 'bun' || github.event_name != 'pull_request'
      run: ${{ matrix.command }}
  extension-fast:
    name: extension-fast (${{ matrix.extension }})
    needs:
    - docs-scope
    - changed-scope
    - changed-extensions
    if: needs.docs-scope.outputs.docs_only != 'true' && needs.changed-scope.outputs.run_node
      == 'true' && needs.changed-extensions.outputs.has_changed_extensions == 'true'
    runs-on: blacksmith-16vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changed-extensions.outputs.changed_extensions_matrix)
        }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: false
    - name: Setup Node environment
      uses: ./.github/actions/setup-node-env
      with:
        install-bun: 'false'
        use-sticky-disk: 'false'
    - name: Run changed extension tests
      env:
        OPENCLAW_CHANGED_EXTENSION: ${{ matrix.extension }}
      run: pnpm test:extension "$OPENCLAW_CHANGED_EXTENSION"
  check:
    name: check
    needs:
    - docs-scope
    - changed-scope
    if: needs.docs-scope.outputs.docs_only != 'true' && needs.changed-scope.outputs.run_node
      == 'true'
    runs-on: blacksmith-16vcpu-ubuntu-2404
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: false
    - name: Setup Node environment
      uses: ./.github/actions/setup-node-env
      with:
        install-bun: 'false'
        use-sticky-disk: 'false'
    - name: Check types and lint and oxfmt
      run: pnpm check
    - name: Strict TS build smoke
      run: pnpm build:strict-smoke
    - name: Enforce safe external URL opening policy
      run: pnpm lint:ui:no-raw-window-open
  plugin-extension-boundary:
    name: plugin-extension-boundary
    needs:
    - docs-scope
    - changed-scope
    if: needs.docs-scope.outputs.docs_only != 'true' && needs.changed-scope.outputs.run_node
      == 'true'
    runs-on: blacksmith-16vcpu-ubuntu-2404
    env:
      PLUGIN_EXTENSION_BOUNDARY_ENFORCE_AFTER: '2026-03-24T05:00:00Z'
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: false
    - name: Setup Node environment
      uses: ./.github/actions/setup-node-env
      with:
        install-bun: 'false'
        use-sticky-disk: 'false'
    - name: Run plugin extension boundary guard with grace period
      shell: bash
      run: "set -euo pipefail\n\ntmp_output=\"$(mktemp)\"\nif pnpm run lint:plugins:no-extension-imports\
        \ >\"$tmp_output\" 2>&1; then\n  cat \"$tmp_output\"\n  rm -f \"$tmp_output\"\
        \n  exit 0\nfi\n\nstatus=$?\ncat \"$tmp_output\"\nrm -f \"$tmp_output\"\n\n\
        now_epoch=\"$(date -u +%s)\"\nenforce_epoch=\"$(date -u -d \"$PLUGIN_EXTENSION_BOUNDARY_ENFORCE_AFTER\"\
        \ +%s)\"\nfix_instructions=\"If you are an LLM agent fixing this: run 'pnpm\
        \ run lint:plugins:no-extension-imports', remove src/plugins/** -> extensions/**\
        \ imports where possible, and if the remaining inventory is intentional for\
        \ now update test/fixtures/plugin-extension-import-boundary-inventory.json\
        \ in the same PR.\"\n\nif [ \"$now_epoch\" -lt \"$enforce_epoch\" ]; then\n\
        \  echo \"::warning::Plugin extension import boundary violations are temporarily\
        \ allowed until ${PLUGIN_EXTENSION_BOUNDARY_ENFORCE_AFTER}. This grace period\
        \ ends in one week from the rollout date. After that timestamp this job will\
        \ fail unless the inventory is reduced or the baseline is intentionally updated.\
        \ ${fix_instructions}\"\n  exit 0\nfi\n\necho \"::error::Plugin extension\
        \ import boundary grace period ended at ${PLUGIN_EXTENSION_BOUNDARY_ENFORCE_AFTER}.\
        \ ${fix_instructions}\"\nexit \"$status\"\n"
  web-search-provider-boundary:
    name: web-search-provider-boundary
    needs:
    - docs-scope
    - changed-scope
    if: needs.docs-scope.outputs.docs_only != 'true' && needs.changed-scope.outputs.run_node
      == 'true'
    runs-on: blacksmith-16vcpu-ubuntu-2404
    env:
      WEB_SEARCH_PROVIDER_BOUNDARY_ENFORCE_AFTER: '2026-03-24T05:00:00Z'
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: false
    - name: Setup Node environment
      uses: ./.github/actions/setup-node-env
      with:
        install-bun: 'false'
        use-sticky-disk: 'false'
    - name: Run web search provider boundary guard with grace period
      shell: bash
      run: "set -euo pipefail\n\ntmp_output=\"$(mktemp)\"\nif pnpm run lint:web-search-provider-boundaries\
        \ >\"$tmp_output\" 2>&1; then\n  cat \"$tmp_output\"\n  rm -f \"$tmp_output\"\
        \n  exit 0\nfi\n\nstatus=$?\ncat \"$tmp_output\"\nrm -f \"$tmp_output\"\n\n\
        now_epoch=\"$(date -u +%s)\"\nenforce_epoch=\"$(date -u -d \"$WEB_SEARCH_PROVIDER_BOUNDARY_ENFORCE_AFTER\"\
        \ +%s)\"\nfix_instructions=\"If you are an LLM agent fixing this: run 'pnpm\
        \ run lint:web-search-provider-boundaries', move provider-specific web-search\
        \ logic out of core, and if the remaining inventory is intentional for now\
        \ update test/fixtures/web-search-provider-boundary-inventory.json in the\
        \ same PR.\"\n\nif [ \"$now_epoch\" -lt \"$enforce_epoch\" ]; then\n  echo\
        \ \"::warning::Web search provider boundary violations are temporarily allowed\
        \ until ${WEB_SEARCH_PROVIDER_BOUNDARY_ENFORCE_AFTER}. This grace period ends\
        \ in one week from the rollout date. After that timestamp this job will fail\
        \ unless the inventory is reduced or the baseline is intentionally updated.\
        \ ${fix_instructions}\"\n  exit 0\nfi\n\necho \"::error::Web search provider\
        \ boundary grace period ended at ${WEB_SEARCH_PROVIDER_BOUNDARY_ENFORCE_AFTER}.\
        \ ${fix_instructions}\"\nexit \"$status\"\n"
  extension-src-outside-plugin-sdk-boundary:
    name: extension-src-outside-plugin-sdk-boundary
    needs:
    - docs-scope
    - changed-scope
    if: needs.docs-scope.outputs.docs_only != 'true' && needs.changed-scope.outputs.run_node
      == 'true'
    runs-on: blacksmith-16vcpu-ubuntu-2404
    env:
      EXTENSION_PLUGIN_SDK_BOUNDARY_ENFORCE_AFTER: '2026-03-24T05:00:00Z'
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: false
    - name: Setup Node environment
      uses: ./.github/actions/setup-node-env
      with:
        install-bun: 'false'
        use-sticky-disk: 'false'
    - name: Run extension src boundary guard with grace period
      shell: bash
      run: "set -euo pipefail\n\ntmp_output=\"$(mktemp)\"\nif pnpm run lint:extensions:no-src-outside-plugin-sdk\
        \ >\"$tmp_output\" 2>&1; then\n  cat \"$tmp_output\"\n  rm -f \"$tmp_output\"\
        \n  exit 0\nfi\n\nstatus=$?\ncat \"$tmp_output\"\nrm -f \"$tmp_output\"\n\n\
        now_epoch=\"$(date -u +%s)\"\nenforce_epoch=\"$(date -u -d \"$EXTENSION_PLUGIN_SDK_BOUNDARY_ENFORCE_AFTER\"\
        \ +%s)\"\nfix_instructions=\"If you are an LLM agent fixing this: run 'pnpm\
        \ run lint:extensions:no-src-outside-plugin-sdk', move extension imports off\
        \ core src paths and onto src/plugin-sdk/**, and if the remaining inventory\
        \ is intentional for now update test/fixtures/extension-src-outside-plugin-sdk-inventory.json\
        \ in the same PR.\"\n\nif [ \"$now_epoch\" -lt \"$enforce_epoch\" ]; then\n\
        \  echo \"::warning::Extension src boundary violations are temporarily allowed\
        \ until ${EXTENSION_PLUGIN_SDK_BOUNDARY_ENFORCE_AFTER}. This grace period\
        \ ends in one week from the rollout date. After that timestamp this job will\
        \ fail unless the inventory is reduced or the baseline is intentionally updated.\
        \ ${fix_instructions}\"\n  exit 0\nfi\n\necho \"::error::Extension src boundary\
        \ grace period ended at ${EXTENSION_PLUGIN_SDK_BOUNDARY_ENFORCE_AFTER}. ${fix_instructions}\"\
        \nexit \"$status\"\n"
  extension-plugin-sdk-internal-boundary:
    name: extension-plugin-sdk-internal-boundary
    needs:
    - docs-scope
    - changed-scope
    if: needs.docs-scope.outputs.docs_only != 'true' && needs.changed-scope.outputs.run_node
      == 'true'
    runs-on: blacksmith-16vcpu-ubuntu-2404
    env:
      EXTENSION_PLUGIN_SDK_INTERNAL_ENFORCE_AFTER: '2026-03-24T05:00:00Z'
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: false
    - name: Setup Node environment
      uses: ./.github/actions/setup-node-env
      with:
        install-bun: 'false'
        use-sticky-disk: 'false'
    - name: Run extension plugin-sdk-internal guard with grace period
      shell: bash
      run: "set -euo pipefail\n\ntmp_output=\"$(mktemp)\"\nif pnpm run lint:extensions:no-plugin-sdk-internal\
        \ >\"$tmp_output\" 2>&1; then\n  cat \"$tmp_output\"\n  rm -f \"$tmp_output\"\
        \n  exit 0\nfi\n\nstatus=$?\ncat \"$tmp_output\"\nrm -f \"$tmp_output\"\n\n\
        now_epoch=\"$(date -u +%s)\"\nenforce_epoch=\"$(date -u -d \"$EXTENSION_PLUGIN_SDK_INTERNAL_ENFORCE_AFTER\"\
        \ +%s)\"\nfix_instructions=\"If you are an LLM agent fixing this: run 'pnpm\
        \ run lint:extensions:no-plugin-sdk-internal', remove extension imports of\
        \ src/plugin-sdk-internal/** in favor of src/plugin-sdk/**, and if the remaining\
        \ inventory is intentional for now update test/fixtures/extension-plugin-sdk-internal-inventory.json\
        \ in the same PR.\"\n\nif [ \"$now_epoch\" -lt \"$enforce_epoch\" ]; then\n\
        \  echo \"::warning::Extension plugin-sdk-internal boundary violations are\
        \ temporarily allowed until ${EXTENSION_PLUGIN_SDK_INTERNAL_ENFORCE_AFTER}.\
        \ This grace period ends in one week from the rollout date. After that timestamp\
        \ this job will fail unless the inventory is reduced or the baseline is intentionally\
        \ updated. ${fix_instructions}\"\n  exit 0\nfi\n\necho \"::error::Extension\
        \ plugin-sdk-internal boundary grace period ended at ${EXTENSION_PLUGIN_SDK_INTERNAL_ENFORCE_AFTER}.\
        \ ${fix_instructions}\"\nexit \"$status\"\n"
  build-smoke:
    name: build-smoke
    needs:
    - docs-scope
    - changed-scope
    if: needs.docs-scope.outputs.docs_only != 'true' && needs.changed-scope.outputs.run_node
      == 'true'
    runs-on: blacksmith-16vcpu-ubuntu-2404
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: false
    - name: Setup Node environment
      uses: ./.github/actions/setup-node-env
      with:
        install-bun: 'false'
        use-sticky-disk: 'false'
    - name: Build dist
      run: pnpm build
    - name: Smoke test CLI launcher help
      run: node openclaw.mjs --help
    - name: Smoke test CLI launcher status json
      run: node openclaw.mjs status --json --timeout 1
    - name: Smoke test built bundled plugin singleton
      run: pnpm test:build:singleton
    - name: Check CLI startup memory
      run: pnpm test:startup:memory
  gateway-watch-regression:
    name: gateway-watch-regression
    needs:
    - docs-scope
    - changed-scope
    if: needs.docs-scope.outputs.docs_only != 'true' && needs.changed-scope.outputs.run_node
      == 'true'
    runs-on: blacksmith-16vcpu-ubuntu-2404
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: false
    - name: Setup Node environment
      uses: ./.github/actions/setup-node-env
      with:
        install-bun: 'false'
        use-sticky-disk: 'false'
    - name: Run gateway watch regression harness
      run: pnpm test:gateway:watch-regression
    - name: Upload gateway watch regression artifacts
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: gateway-watch-regression
        path: .local/gateway-watch-regression/
        retention-days: 7
  check-docs:
    needs:
    - docs-scope
    if: needs.docs-scope.outputs.docs_changed == 'true'
    runs-on: blacksmith-16vcpu-ubuntu-2404
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: false
    - name: Setup Node environment
      uses: ./.github/actions/setup-node-env
      with:
        install-bun: 'false'
        use-sticky-disk: 'false'
    - name: Check docs
      run: pnpm check:docs
  compat-node22:
    name: compat-node22
    needs:
    - docs-scope
    - changed-scope
    if: github.event_name == 'push' && needs.docs-scope.outputs.docs_only != 'true'
      && needs.changed-scope.outputs.run_node == 'true'
    runs-on: blacksmith-16vcpu-ubuntu-2404
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: false
    - name: Setup Node 22 compatibility environment
      uses: ./.github/actions/setup-node-env
      with:
        node-version: 22.x
        cache-key-suffix: node22
        install-bun: 'false'
        use-sticky-disk: 'false'
    - name: Configure Node 22 test resources
      run: '# Keep the compatibility lane aligned with the default Node test lane.

        echo "OPENCLAW_TEST_WORKERS=2" >> "$GITHUB_ENV"

        echo "OPENCLAW_TEST_MAX_OLD_SPACE_SIZE_MB=6144" >> "$GITHUB_ENV"

        '
    - name: Build under Node 22
      run: pnpm build
    - name: Run tests under Node 22
      run: pnpm test
    - name: Verify npm pack under Node 22
      run: pnpm release:check
  skills-python:
    needs:
    - docs-scope
    - changed-scope
    if: needs.docs-scope.outputs.docs_only != 'true' && needs.changed-scope.outputs.run_skills_python
      == 'true'
    runs-on: blacksmith-16vcpu-ubuntu-2404
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: false
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - name: Install Python tooling
      run: 'python -m pip install --upgrade pip

        python -m pip install pytest ruff pyyaml

        '
    - name: Lint Python skill scripts
      run: python -m ruff check skills
    - name: Test skill Python scripts
      run: python -m pytest -q skills
  secrets:
    runs-on: blacksmith-16vcpu-ubuntu-2404
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: false
    - name: Ensure secrets base commit
      uses: ./.github/actions/ensure-base-commit
      with:
        base-sha: ${{ github.event_name == 'push' && github.event.before || github.event.pull_request.base.sha
          }}
        fetch-ref: ${{ github.event_name == 'push' && github.ref_name || github.event.pull_request.base.ref
          }}
    - name: Setup Node environment
      uses: ./.github/actions/setup-node-env
      with:
        install-bun: 'false'
        use-sticky-disk: 'false'
        install-deps: 'false'
    - name: Setup Python
      id: setup-python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        cache: pip
