        \ (-not $cmd) {\n  Write-Host \"Add-MpPreference not available, skipping Defender\
        \ exclusions.\"\n  exit 0\n}\n\ntry {\n  # Defender sometimes intercepts process\
        \ spawning (vitest workers). If this fails\n  # (eg hardened images), keep\
        \ going and rely on worker limiting above.\n  Add-MpPreference -ExclusionPath\
        \ \"$env:GITHUB_WORKSPACE\" -ErrorAction Stop\n  Add-MpPreference -ExclusionProcess\
        \ \"node.exe\" -ErrorAction Stop\n  Write-Host \"Defender exclusions applied.\"\
        \n} catch {\n  Write-Warning \"Failed to apply Defender exclusions, continuing.\
        \ $($_.Exception.Message)\"\n}\n"
