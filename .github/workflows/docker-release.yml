name: Docker Release
true:
  push:
    branches:
    - main
    tags:
    - v*
    paths-ignore:
    - docs/**
    - '**/*.md'
    - '**/*.mdx'
    - .agents/**
    - skills/**
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to backfill (for example v2026.3.13)
        required: true
        type: string
concurrency:
  group: docker-release-${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch'
    && inputs.tag || github.ref }}
  cancel-in-progress: false
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
jobs:
  validate_manual_backfill:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
    - name: Validate tag input format
      env:
        RELEASE_TAG: ${{ inputs.tag }}
      run: "set -euo pipefail\nif [[ ! \"${RELEASE_TAG}\" =~ ^v[0-9]{4}\\.[1-9][0-9]*\\\
        .[1-9][0-9]*(-beta\\.[1-9][0-9]*)?$ ]]; then\n  echo \"Invalid release tag:\
        \ ${RELEASE_TAG}\"\n  exit 1\nfi\n"
    - name: Checkout selected tag
      uses: actions/checkout@v6
      with:
        ref: refs/tags/${{ inputs.tag }}
        fetch-depth: 0
  approve_manual_backfill:
    if: github.event_name == 'workflow_dispatch'
    needs: validate_manual_backfill
    runs-on: ubuntu-24.04
    environment: docker-release
    steps:
    - name: Approve Docker backfill
      env:
        RELEASE_TAG: ${{ inputs.tag }}
      run: echo "Approved Docker backfill for $RELEASE_TAG"
  build-amd64:
    needs:
    - approve_manual_backfill
    if: ${{ always() && (github.event_name != 'workflow_dispatch' || needs.approve_manual_backfill.result
      == 'success') }}
    runs-on: ubuntu-24.04
    permissions:
      packages: write
      contents: read
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      slim-digest: ${{ steps.build-slim.outputs.digest }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}',
          inputs.tag) || github.ref }}
        fetch-depth: 0
    - name: Set up Docker Builder
      uses: docker/setup-buildx-action@v4
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Resolve image tags (amd64)
      id: tags
      shell: bash
      env:
        IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        SOURCE_REF: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}',
          inputs.tag) || github.ref }}
      run: "set -euo pipefail\ntags=()\nslim_tags=()\nif [[ \"${SOURCE_REF}\" == \"\
        refs/heads/main\" ]]; then\n  tags+=(\"${IMAGE}:main-amd64\")\n  slim_tags+=(\"\
        ${IMAGE}:main-slim-amd64\")\nfi\nif [[ \"${SOURCE_REF}\" == refs/tags/v* ]];\
        \ then\n  version=\"${SOURCE_REF#refs/tags/v}\"\n  tags+=(\"${IMAGE}:${version}-amd64\"\
        )\n  slim_tags+=(\"${IMAGE}:${version}-slim-amd64\")\nfi\nif [[ ${#tags[@]}\
        \ -eq 0 ]]; then\n  echo \"::error::No amd64 tags resolved for ref ${SOURCE_REF}\"\
        \n  exit 1\nfi\n{\n  echo \"value<<EOF\"\n  printf \"%s\\n\" \"${tags[@]}\"\
        \n  echo \"EOF\"\n} >> \"$GITHUB_OUTPUT\"\n{\n  echo \"slim<<EOF\"\n  printf\
        \ \"%s\\n\" \"${slim_tags[@]}\"\n  echo \"EOF\"\n} >> \"$GITHUB_OUTPUT\"\n"
    - name: Resolve OCI labels (amd64)
      id: labels
      shell: bash
      env:
        SOURCE_REF: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}',
          inputs.tag) || github.ref }}
      run: "set -euo pipefail\nsource_sha=\"$(git rev-parse HEAD)\"\nversion=\"${source_sha}\"\
        \nif [[ \"${SOURCE_REF}\" == \"refs/heads/main\" ]]; then\n  version=\"main\"\
        \nfi\nif [[ \"${SOURCE_REF}\" == refs/tags/v* ]]; then\n  version=\"${SOURCE_REF#refs/tags/v}\"\
        \nfi\ncreated=\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"\n{\n  echo \"value<<EOF\"\
        \n  echo \"org.opencontainers.image.revision=${source_sha}\"\n  echo \"org.opencontainers.image.version=${version}\"\
        \n  echo \"org.opencontainers.image.created=${created}\"\n  echo \"EOF\"\n\
        } >> \"$GITHUB_OUTPUT\"\n"
    - name: Build and push amd64 image
      id: build
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64
        tags: ${{ steps.tags.outputs.value }}
        labels: ${{ steps.labels.outputs.value }}
        provenance: false
        push: true
    - name: Build and push amd64 slim image
      id: build-slim
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64
        build-args: 'OPENCLAW_VARIANT=slim

          '
        tags: ${{ steps.tags.outputs.slim }}
        labels: ${{ steps.labels.outputs.value }}
        provenance: false
        push: true
  build-arm64:
    needs:
    - approve_manual_backfill
    if: ${{ always() && (github.event_name != 'workflow_dispatch' || needs.approve_manual_backfill.result
      == 'success') }}
    runs-on: ubuntu-24.04-arm
    permissions:
      packages: write
      contents: read
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      slim-digest: ${{ steps.build-slim.outputs.digest }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}',
          inputs.tag) || github.ref }}
        fetch-depth: 0
    - name: Set up Docker Builder
      uses: docker/setup-buildx-action@v4
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Resolve image tags (arm64)
      id: tags
      shell: bash
      env:
        IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        SOURCE_REF: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}',
          inputs.tag) || github.ref }}
      run: "set -euo pipefail\ntags=()\nslim_tags=()\nif [[ \"${SOURCE_REF}\" == \"\
        refs/heads/main\" ]]; then\n  tags+=(\"${IMAGE}:main-arm64\")\n  slim_tags+=(\"\
        ${IMAGE}:main-slim-arm64\")\nfi\nif [[ \"${SOURCE_REF}\" == refs/tags/v* ]];\
        \ then\n  version=\"${SOURCE_REF#refs/tags/v}\"\n  tags+=(\"${IMAGE}:${version}-arm64\"\
        )\n  slim_tags+=(\"${IMAGE}:${version}-slim-arm64\")\nfi\nif [[ ${#tags[@]}\
        \ -eq 0 ]]; then\n  echo \"::error::No arm64 tags resolved for ref ${SOURCE_REF}\"\
        \n  exit 1\nfi\n{\n  echo \"value<<EOF\"\n  printf \"%s\\n\" \"${tags[@]}\"\
        \n  echo \"EOF\"\n} >> \"$GITHUB_OUTPUT\"\n{\n  echo \"slim<<EOF\"\n  printf\
        \ \"%s\\n\" \"${slim_tags[@]}\"\n  echo \"EOF\"\n} >> \"$GITHUB_OUTPUT\"\n"
    - name: Resolve OCI labels (arm64)
      id: labels
      shell: bash
      env:
        SOURCE_REF: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}',
          inputs.tag) || github.ref }}
      run: "set -euo pipefail\nsource_sha=\"$(git rev-parse HEAD)\"\nversion=\"${source_sha}\"\
        \nif [[ \"${SOURCE_REF}\" == \"refs/heads/main\" ]]; then\n  version=\"main\"\
        \nfi\nif [[ \"${SOURCE_REF}\" == refs/tags/v* ]]; then\n  version=\"${SOURCE_REF#refs/tags/v}\"\
        \nfi\ncreated=\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"\n{\n  echo \"value<<EOF\"\
        \n  echo \"org.opencontainers.image.revision=${source_sha}\"\n  echo \"org.opencontainers.image.version=${version}\"\
        \n  echo \"org.opencontainers.image.created=${created}\"\n  echo \"EOF\"\n\
        } >> \"$GITHUB_OUTPUT\"\n"
    - name: Build and push arm64 image
      id: build
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/arm64
        tags: ${{ steps.tags.outputs.value }}
        labels: ${{ steps.labels.outputs.value }}
        provenance: false
        push: true
    - name: Build and push arm64 slim image
      id: build-slim
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/arm64
        build-args: 'OPENCLAW_VARIANT=slim

          '
        tags: ${{ steps.tags.outputs.slim }}
        labels: ${{ steps.labels.outputs.value }}
        provenance: false
        push: true
  create-manifest:
    needs:
    - approve_manual_backfill
    - build-amd64
    - build-arm64
    if: ${{ always() && needs.build-amd64.result == 'success' && needs.build-arm64.result
      == 'success' && (github.event_name != 'workflow_dispatch' || needs.approve_manual_backfill.result
      == 'success') }}
    runs-on: ubuntu-24.04
    permissions:
      packages: write
      contents: read
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}',
          inputs.tag) || github.ref }}
        fetch-depth: 0
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Resolve manifest tags
      id: tags
      shell: bash
      env:
        IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        SOURCE_REF: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}',
          inputs.tag) || github.ref }}
        IS_MANUAL_BACKFILL: ${{ github.event_name == 'workflow_dispatch' && '1' ||
          '0' }}
      run: "set -euo pipefail\ntags=()\nslim_tags=()\nif [[ \"${SOURCE_REF}\" == \"\
        refs/heads/main\" ]]; then\n  tags+=(\"${IMAGE}:main\")\n  slim_tags+=(\"\
        ${IMAGE}:main-slim\")\nfi\nif [[ \"${SOURCE_REF}\" == refs/tags/v* ]]; then\n\
        \  version=\"${SOURCE_REF#refs/tags/v}\"\n  tags+=(\"${IMAGE}:${version}\"\
        )\n  slim_tags+=(\"${IMAGE}:${version}-slim\")\n  # Manual backfills should\
        \ only republish the requested version tags.\n  if [[ \"${IS_MANUAL_BACKFILL}\"\
        \ != \"1\" && \"$version\" =~ ^[0-9]+\\.[0-9]+\\.[0-9]+(-[0-9]+)?$ ]]; then\n\
        \    tags+=(\"${IMAGE}:latest\")\n    slim_tags+=(\"${IMAGE}:slim\")\n  fi\n\
        fi\nif [[ ${#tags[@]} -eq 0 ]]; then\n  echo \"::error::No manifest tags resolved\
        \ for ref ${SOURCE_REF}\"\n  exit 1\nfi\n{\n  echo \"value<<EOF\"\n  printf\
        \ \"%s\\n\" \"${tags[@]}\"\n  echo \"EOF\"\n} >> \"$GITHUB_OUTPUT\"\n{\n \
        \ echo \"slim<<EOF\"\n  printf \"%s\\n\" \"${slim_tags[@]}\"\n  echo \"EOF\"\
        \n} >> \"$GITHUB_OUTPUT\"\n"
    - name: Create and push default manifest
      shell: bash
      run: "set -euo pipefail\nmapfile -t tags <<< \"${{ steps.tags.outputs.value\
        \ }}\"\nargs=()\nfor tag in \"${tags[@]}\"; do\n  [ -z \"$tag\" ] && continue\n\
        \  args+=(\"-t\" \"$tag\")\ndone\ndocker buildx imagetools create \"${args[@]}\"\
        \ \\\n  ${{ needs.build-amd64.outputs.digest }} \\\n  ${{ needs.build-arm64.outputs.digest\
        \ }}\n"
    - name: Create and push slim manifest
      shell: bash
      run: "set -euo pipefail\nmapfile -t tags <<< \"${{ steps.tags.outputs.slim }}\"\
        \nargs=()\nfor tag in \"${tags[@]}\"; do\n  [ -z \"$tag\" ] && continue\n\
        \  args+=(\"-t\" \"$tag\")\ndone\ndocker buildx imagetools create \"${args[@]}\"\
        \ \\\n  ${{ needs.build-amd64.outputs.slim-digest }} \\\n  ${{ needs.build-arm64.outputs.slim-digest\
        \ }}\n"
'on':
  workflow_dispatch: null
