name: Labeler
true:
  pull_request_target:
    types:
    - opened
    - synchronize
    - reopened
  issues:
    types:
    - opened
  workflow_dispatch:
    inputs:
      max_prs:
        description: Maximum number of open PRs to process (0 = all)
        required: false
        default: '200'
      per_page:
        description: PRs per page (1-100)
        required: false
        default: '50'
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
permissions: {}
jobs:
  label:
    permissions:
      contents: read
      pull-requests: write
    runs-on: blacksmith-16vcpu-ubuntu-2404
    steps:
    - uses: actions/create-github-app-token@v2
      id: app-token
      continue-on-error: true
      with:
        app-id: '2729701'
        private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
    - uses: actions/create-github-app-token@v2
      id: app-token-fallback
      if: steps.app-token.outcome == 'failure'
      with:
        app-id: '2971289'
        private-key: ${{ secrets.GH_APP_PRIVATE_KEY_FALLBACK }}
    - uses: actions/labeler@v6
      with:
        configuration-path: .github/labeler.yml
        repo-token: ${{ steps.app-token.outputs.token || steps.app-token-fallback.outputs.token
          }}
        sync-labels: true
    - name: Apply PR size label
      uses: actions/github-script@v8
      with:
        github-token: ${{ steps.app-token.outputs.token || steps.app-token-fallback.outputs.token
          }}
        script: "const pullRequest = context.payload.pull_request;\nif (!pullRequest)\
          \ {\n  return;\n}\n\nconst sizeLabels = [\"size: XS\", \"size: S\", \"size:\
          \ M\", \"size: L\", \"size: XL\"];\nconst labelColor = \"b76e79\";\n\nfor\
          \ (const label of sizeLabels) {\n  try {\n    await github.rest.issues.getLabel({\n\
          \      owner: context.repo.owner,\n      repo: context.repo.repo,\n    \
          \  name: label,\n    });\n  } catch (error) {\n    if (error?.status !==\
          \ 404) {\n      throw error;\n    }\n    await github.rest.issues.createLabel({\n\
          \      owner: context.repo.owner,\n      repo: context.repo.repo,\n    \
          \  name: label,\n      color: labelColor,\n    });\n  }\n}\n\nconst files\
          \ = await github.paginate(github.rest.pulls.listFiles, {\n  owner: context.repo.owner,\n\
          \  repo: context.repo.repo,\n  pull_number: pullRequest.number,\n  per_page:\
          \ 100,\n});\n\nconst excludedLockfiles = new Set([\"pnpm-lock.yaml\", \"\
          package-lock.json\", \"yarn.lock\", \"bun.lockb\"]);\nconst totalChangedLines\
          \ = files.reduce((total, file) => {\n  const path = file.filename ?? \"\"\
          ;\n  if (path === \"docs.acp.md\" || path.startsWith(\"docs/\") || excludedLockfiles.has(path))\
          \ {\n    return total;\n  }\n  return total + (file.additions ?? 0) + (file.deletions\
          \ ?? 0);\n}, 0);\n\nlet targetSizeLabel = \"size: XL\";\nif (totalChangedLines\
          \ < 50) {\n  targetSizeLabel = \"size: XS\";\n} else if (totalChangedLines\
          \ < 200) {\n  targetSizeLabel = \"size: S\";\n} else if (totalChangedLines\
          \ < 500) {\n  targetSizeLabel = \"size: M\";\n} else if (totalChangedLines\
          \ < 1000) {\n  targetSizeLabel = \"size: L\";\n}\n\nconst currentLabels\
          \ = await github.paginate(github.rest.issues.listLabelsOnIssue, {\n  owner:\
          \ context.repo.owner,\n  repo: context.repo.repo,\n  issue_number: pullRequest.number,\n\
          \  per_page: 100,\n});\n\nfor (const label of currentLabels) {\n  const\
          \ name = label.name ?? \"\";\n  if (!sizeLabels.includes(name)) {\n    continue;\n\
          \  }\n  if (name === targetSizeLabel) {\n    continue;\n  }\n  await github.rest.issues.removeLabel({\n\
          \    owner: context.repo.owner,\n    repo: context.repo.repo,\n    issue_number:\
          \ pullRequest.number,\n    name,\n  });\n}\n\nawait github.rest.issues.addLabels({\n\
          \  owner: context.repo.owner,\n  repo: context.repo.repo,\n  issue_number:\
          \ pullRequest.number,\n  labels: [targetSizeLabel],\n});\n"
    - name: Apply maintainer or trusted-contributor label
      uses: actions/github-script@v8
      with:
        github-token: ${{ steps.app-token.outputs.token || steps.app-token-fallback.outputs.token
          }}
        script: "const login = context.payload.pull_request?.user?.login;\nif (!login)\
          \ {\n  return;\n}\n\nconst repo = `${context.repo.owner}/${context.repo.repo}`;\n\
          // const trustedLabel = \"trusted-contributor\";\n// const experiencedLabel\
          \ = \"experienced-contributor\";\n// const trustedThreshold = 4;\n// const\
          \ experiencedThreshold = 10;\n\nlet isMaintainer = false;\ntry {\n  const\
          \ membership = await github.rest.teams.getMembershipForUserInOrg({\n   \
          \ org: context.repo.owner,\n    team_slug: \"maintainer\",\n    username:\
          \ login,\n  });\n  isMaintainer = membership?.data?.state === \"active\"\
          ;\n} catch (error) {\n  if (error?.status !== 404) {\n    throw error;\n\
          \  }\n}\n\nif (isMaintainer) {\n  await github.rest.issues.addLabels({\n\
          \    ...context.repo,\n    issue_number: context.payload.pull_request.number,\n\
          \    labels: [\"maintainer\"],\n  });\n  return;\n}\n\n// trusted-contributor\
          \ and experienced-contributor labels disabled.\n// const mergedQuery = `repo:${repo}\
          \ is:pr is:merged author:${login}`;\n// let mergedCount = 0;\n// try {\n\
          //   const merged = await github.rest.search.issuesAndPullRequests({\n//\
          \     q: mergedQuery,\n//     per_page: 1,\n//   });\n//   mergedCount =\
          \ merged?.data?.total_count ?? 0;\n// } catch (error) {\n//   if (error?.status\
          \ !== 422) {\n//     throw error;\n//   }\n//   core.warning(`Skipping merged\
          \ search for ${login}; treating as 0.`);\n// }\n//\n// if (mergedCount >=\
          \ experiencedThreshold) {\n//   await github.rest.issues.addLabels({\n//\
          \     ...context.repo,\n//     issue_number: context.payload.pull_request.number,\n\
          //     labels: [experiencedLabel],\n//   });\n//   return;\n// }\n//\n//\
          \ if (mergedCount >= trustedThreshold) {\n//   await github.rest.issues.addLabels({\n\
          //     ...context.repo,\n//     issue_number: context.payload.pull_request.number,\n\
          //     labels: [trustedLabel],\n//   });\n// }\n"
    - name: Apply too-many-prs label
      uses: actions/github-script@v8
      with:
        github-token: ${{ steps.app-token.outputs.token || steps.app-token-fallback.outputs.token
          }}
        script: "const pullRequest = context.payload.pull_request;\nif (!pullRequest)\
          \ {\n  return;\n}\n\nconst activePrLimitLabel = \"r: too-many-prs\";\nconst\
          \ activePrLimitOverrideLabel = \"r: too-many-prs-override\";\nconst activePrLimit\
          \ = 10;\nconst labelColor = \"B60205\";\nconst labelDescription = `Author\
          \ has more than ${activePrLimit} active PRs in this repo`;\nconst authorLogin\
          \ = pullRequest.user?.login;\nif (!authorLogin) {\n  return;\n}\n\nconst\
          \ currentLabels = await github.paginate(github.rest.issues.listLabelsOnIssue,\
          \ {\n  owner: context.repo.owner,\n  repo: context.repo.repo,\n  issue_number:\
          \ pullRequest.number,\n  per_page: 100,\n});\n\nconst labelNames = new Set(\n\
          \  currentLabels\n    .map((label) => (typeof label === \"string\" ? label\
          \ : label?.name))\n    .filter((name) => typeof name === \"string\"),\n\
          );\n\nif (labelNames.has(activePrLimitOverrideLabel)) {\n  if (labelNames.has(activePrLimitLabel))\
          \ {\n    try {\n      await github.rest.issues.removeLabel({\n        owner:\
          \ context.repo.owner,\n        repo: context.repo.repo,\n        issue_number:\
          \ pullRequest.number,\n        name: activePrLimitLabel,\n      });\n  \
          \  } catch (error) {\n      if (error?.status !== 404) {\n        throw\
          \ error;\n      }\n    }\n  }\n  return;\n}\n\nconst ensureLabelExists =\
          \ async () => {\n  try {\n    await github.rest.issues.getLabel({\n    \
          \  owner: context.repo.owner,\n      repo: context.repo.repo,\n      name:\
          \ activePrLimitLabel,\n    });\n  } catch (error) {\n    if (error?.status\
          \ !== 404) {\n      throw error;\n    }\n    await github.rest.issues.createLabel({\n\
          \      owner: context.repo.owner,\n      repo: context.repo.repo,\n    \
          \  name: activePrLimitLabel,\n      color: labelColor,\n      description:\
          \ labelDescription,\n    });\n  }\n};\n\nconst isPrivilegedAuthor = async\
          \ () => {\n  if (pullRequest.author_association === \"OWNER\") {\n    return\
          \ true;\n  }\n\n  let isMaintainer = false;\n  try {\n    const membership\
          \ = await github.rest.teams.getMembershipForUserInOrg({\n      org: context.repo.owner,\n\
          \      team_slug: \"maintainer\",\n      username: authorLogin,\n    });\n\
          \    isMaintainer = membership?.data?.state === \"active\";\n  } catch (error)\
          \ {\n    if (error?.status !== 404) {\n      throw error;\n    }\n  }\n\n\
          \  if (isMaintainer) {\n    return true;\n  }\n\n  try {\n    const permission\
          \ = await github.rest.repos.getCollaboratorPermissionLevel({\n      owner:\
          \ context.repo.owner,\n      repo: context.repo.repo,\n      username: authorLogin,\n\
          \    });\n    const roleName = (permission?.data?.role_name ?? \"\").toLowerCase();\n\
          \    return roleName === \"admin\" || roleName === \"maintain\";\n  } catch\
          \ (error) {\n    if (error?.status !== 404) {\n      throw error;\n    }\n\
          \  }\n\n  return false;\n};\n\nif (await isPrivilegedAuthor()) {\n  if (labelNames.has(activePrLimitLabel))\
          \ {\n    try {\n      await github.rest.issues.removeLabel({\n        owner:\
          \ context.repo.owner,\n        repo: context.repo.repo,\n        issue_number:\
          \ pullRequest.number,\n        name: activePrLimitLabel,\n      });\n  \
          \  } catch (error) {\n      if (error?.status !== 404) {\n        throw\
          \ error;\n      }\n    }\n  }\n  return;\n}\n\nlet openPrCount = 0;\ntry\
          \ {\n  const result = await github.rest.search.issuesAndPullRequests({\n\
          \    q: `repo:${context.repo.owner}/${context.repo.repo} is:pr is:open author:${authorLogin}`,\n\
          \    per_page: 1,\n  });\n  openPrCount = result?.data?.total_count ?? 0;\n\
          } catch (error) {\n  if (error?.status !== 422) {\n    throw error;\n  }\n\
          \  core.warning(`Skipping open PR count for ${authorLogin}; treating as\
          \ 0.`);\n}\n\nif (openPrCount > activePrLimit) {\n  await ensureLabelExists();\n\
          \  if (!labelNames.has(activePrLimitLabel)) {\n    await github.rest.issues.addLabels({\n\
          \      owner: context.repo.owner,\n      repo: context.repo.repo,\n    \
          \  issue_number: pullRequest.number,\n      labels: [activePrLimitLabel],\n\
          \    });\n  }\n  return;\n}\n\nif (labelNames.has(activePrLimitLabel)) {\n\
          \  try {\n    await github.rest.issues.removeLabel({\n      owner: context.repo.owner,\n\
          \      repo: context.repo.repo,\n      issue_number: pullRequest.number,\n\
          \      name: activePrLimitLabel,\n    });\n  } catch (error) {\n    if (error?.status\
          \ !== 404) {\n      throw error;\n    }\n  }\n}\n"
  backfill-pr-labels:
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      pull-requests: write
    runs-on: blacksmith-16vcpu-ubuntu-2404
    steps:
    - uses: actions/create-github-app-token@v2
      id: app-token
      continue-on-error: true
      with:
        app-id: '2729701'
        private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
    - uses: actions/create-github-app-token@v2
      id: app-token-fallback
      if: steps.app-token.outcome == 'failure'
      with:
        app-id: '2971289'
        private-key: ${{ secrets.GH_APP_PRIVATE_KEY_FALLBACK }}
    - name: Backfill PR labels
      uses: actions/github-script@v8
      with:
        github-token: ${{ steps.app-token.outputs.token || steps.app-token-fallback.outputs.token
          }}
        script: "const owner = context.repo.owner;\nconst repo = context.repo.repo;\n\
          const repoFull = `${owner}/${repo}`;\nconst inputs = context.payload.inputs\
          \ ?? {};\nconst maxPrsInput = inputs.max_prs ?? \"200\";\nconst perPageInput\
          \ = inputs.per_page ?? \"50\";\nconst parsedMaxPrs = Number.parseInt(maxPrsInput,\
          \ 10);\nconst parsedPerPage = Number.parseInt(perPageInput, 10);\nconst\
          \ maxPrs = Number.isFinite(parsedMaxPrs) ? parsedMaxPrs : 200;\nconst perPage\
          \ = Number.isFinite(parsedPerPage) ? Math.min(100, Math.max(1, parsedPerPage))\
          \ : 50;\nconst processAll = maxPrs <= 0;\nconst maxCount = processAll ?\
          \ Number.POSITIVE_INFINITY : Math.max(1, maxPrs);\n\nconst sizeLabels =\
          \ [\"size: XS\", \"size: S\", \"size: M\", \"size: L\", \"size: XL\"];\n\
          const labelColor = \"b76e79\";\n// const trustedLabel = \"trusted-contributor\"\
          ;\n// const experiencedLabel = \"experienced-contributor\";\n// const trustedThreshold\
          \ = 4;\n// const experiencedThreshold = 10;\n\nconst contributorCache =\
          \ new Map();\n\nasync function ensureSizeLabels() {\n  for (const label\
          \ of sizeLabels) {\n    try {\n      await github.rest.issues.getLabel({\n\
          \        owner,\n        repo,\n        name: label,\n      });\n    } catch\
          \ (error) {\n      if (error?.status !== 404) {\n        throw error;\n\
          \      }\n      await github.rest.issues.createLabel({\n        owner,\n\
          \        repo,\n        name: label,\n        color: labelColor,\n     \
          \ });\n    }\n  }\n}\n\nasync function resolveContributorLabel(login) {\n\
          \  if (contributorCache.has(login)) {\n    return contributorCache.get(login);\n\
          \  }\n\n  let isMaintainer = false;\n  try {\n    const membership = await\
          \ github.rest.teams.getMembershipForUserInOrg({\n      org: owner,\n   \
          \   team_slug: \"maintainer\",\n      username: login,\n    });\n    isMaintainer\
          \ = membership?.data?.state === \"active\";\n  } catch (error) {\n    if\
          \ (error?.status !== 404) {\n      throw error;\n    }\n  }\n\n  if (isMaintainer)\
          \ {\n    contributorCache.set(login, \"maintainer\");\n    return \"maintainer\"\
          ;\n  }\n\n  // trusted-contributor and experienced-contributor labels disabled.\n\
          \  // const mergedQuery = `repo:${repoFull} is:pr is:merged author:${login}`;\n\
          \  // let mergedCount = 0;\n  // try {\n  //   const merged = await github.rest.search.issuesAndPullRequests({\n\
          \  //     q: mergedQuery,\n  //     per_page: 1,\n  //   });\n  //   mergedCount\
          \ = merged?.data?.total_count ?? 0;\n  // } catch (error) {\n  //   if (error?.status\
          \ !== 422) {\n  //     throw error;\n  //   }\n  //   core.warning(`Skipping\
          \ merged search for ${login}; treating as 0.`);\n  // }\n\n  const label\
          \ = null;\n  // if (mergedCount >= experiencedThreshold) {\n  //   label\
          \ = experiencedLabel;\n  // } else if (mergedCount >= trustedThreshold)\
          \ {\n  //   label = trustedLabel;\n  // }\n\n  contributorCache.set(login,\
          \ label);\n  return label;\n}\n\nasync function applySizeLabel(pullRequest,\
          \ currentLabels, labelNames) {\n  const files = await github.paginate(github.rest.pulls.listFiles,\
          \ {\n    owner,\n    repo,\n    pull_number: pullRequest.number,\n    per_page:\
          \ 100,\n  });\n\n  const excludedLockfiles = new Set([\"pnpm-lock.yaml\"\
          , \"package-lock.json\", \"yarn.lock\", \"bun.lockb\"]);\n  const totalChangedLines\
          \ = files.reduce((total, file) => {\n    const path = file.filename ?? \"\
          \";\n    if (path === \"docs.acp.md\" || path.startsWith(\"docs/\") || excludedLockfiles.has(path))\
          \ {\n      return total;\n    }\n    return total + (file.additions ?? 0)\
          \ + (file.deletions ?? 0);\n  }, 0);\n\n  let targetSizeLabel = \"size:\
          \ XL\";\n  if (totalChangedLines < 50) {\n    targetSizeLabel = \"size:\
          \ XS\";\n  } else if (totalChangedLines < 200) {\n    targetSizeLabel =\
          \ \"size: S\";\n  } else if (totalChangedLines < 500) {\n    targetSizeLabel\
          \ = \"size: M\";\n  } else if (totalChangedLines < 1000) {\n    targetSizeLabel\
          \ = \"size: L\";\n  }\n\n  for (const label of currentLabels) {\n    const\
          \ name = label.name ?? \"\";\n    if (!sizeLabels.includes(name)) {\n  \
          \    continue;\n    }\n    if (name === targetSizeLabel) {\n      continue;\n\
          \    }\n    await github.rest.issues.removeLabel({\n      owner,\n     \
          \ repo,\n      issue_number: pullRequest.number,\n      name,\n    });\n\
          \    labelNames.delete(name);\n  }\n\n  if (!labelNames.has(targetSizeLabel))\
          \ {\n    await github.rest.issues.addLabels({\n      owner,\n      repo,\n\
          \      issue_number: pullRequest.number,\n      labels: [targetSizeLabel],\n\
          \    });\n    labelNames.add(targetSizeLabel);\n  }\n}\n\nasync function\
          \ applyContributorLabel(pullRequest, labelNames) {\n  const login = pullRequest.user?.login;\n\
          \  if (!login) {\n    return;\n  }\n\n  const label = await resolveContributorLabel(login);\n\
          \  if (!label) {\n    return;\n  }\n\n  if (labelNames.has(label)) {\n \
          \   return;\n  }\n\n  await github.rest.issues.addLabels({\n    owner,\n\
          \    repo,\n    issue_number: pullRequest.number,\n    labels: [label],\n\
          \  });\n  labelNames.add(label);\n}\n\nawait ensureSizeLabels();\n\nlet\
          \ page = 1;\nlet processed = 0;\n\nwhile (processed < maxCount) {\n  const\
          \ remaining = maxCount - processed;\n  const pageSize = processAll ? perPage\
          \ : Math.min(perPage, remaining);\n  const { data: pullRequests } = await\
          \ github.rest.pulls.list({\n    owner,\n    repo,\n    state: \"open\",\n\
          \    per_page: pageSize,\n    page,\n  });\n\n  if (pullRequests.length\
          \ === 0) {\n    break;\n  }\n\n  for (const pullRequest of pullRequests)\
          \ {\n    if (!processAll && processed >= maxCount) {\n      break;\n   \
          \ }\n\n    const currentLabels = await github.paginate(github.rest.issues.listLabelsOnIssue,\
          \ {\n      owner,\n      repo,\n      issue_number: pullRequest.number,\n\
          \      per_page: 100,\n    });\n\n    const labelNames = new Set(\n    \
          \  currentLabels.map((label) => label.name).filter((name) => typeof name\
          \ === \"string\"),\n    );\n\n    await applySizeLabel(pullRequest, currentLabels,\
          \ labelNames);\n    await applyContributorLabel(pullRequest, labelNames);\n\
          \n    processed += 1;\n  }\n\n  if (pullRequests.length < pageSize) {\n\
          \    break;\n  }\n\n  page += 1;\n}\n\ncore.info(`Processed ${processed}\
          \ pull requests.`);\n"
  label-issues:
    permissions:
      issues: write
    runs-on: blacksmith-16vcpu-ubuntu-2404
    steps:
    - uses: actions/create-github-app-token@v2
      id: app-token
      continue-on-error: true
      with:
        app-id: '2729701'
        private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
    - uses: actions/create-github-app-token@v2
      id: app-token-fallback
      if: steps.app-token.outcome == 'failure'
      with:
        app-id: '2971289'
        private-key: ${{ secrets.GH_APP_PRIVATE_KEY_FALLBACK }}
    - name: Apply maintainer or trusted-contributor label
      uses: actions/github-script@v8
      with:
        github-token: ${{ steps.app-token.outputs.token || steps.app-token-fallback.outputs.token
          }}
        script: "const login = context.payload.issue?.user?.login;\nif (!login) {\n\
          \  return;\n}\n\nconst repo = `${context.repo.owner}/${context.repo.repo}`;\n\
          // const trustedLabel = \"trusted-contributor\";\n// const experiencedLabel\
          \ = \"experienced-contributor\";\n// const trustedThreshold = 4;\n// const\
          \ experiencedThreshold = 10;\n\nlet isMaintainer = false;\ntry {\n  const\
          \ membership = await github.rest.teams.getMembershipForUserInOrg({\n   \
          \ org: context.repo.owner,\n    team_slug: \"maintainer\",\n    username:\
          \ login,\n  });\n  isMaintainer = membership?.data?.state === \"active\"\
          ;\n} catch (error) {\n  if (error?.status !== 404) {\n    throw error;\n\
          \  }\n}\n\nif (isMaintainer) {\n  await github.rest.issues.addLabels({\n\
          \    ...context.repo,\n    issue_number: context.payload.issue.number,\n\
          \    labels: [\"maintainer\"],\n  });\n  return;\n}\n\n// trusted-contributor\
          \ and experienced-contributor labels disabled.\n// const mergedQuery = `repo:${repo}\
          \ is:pr is:merged author:${login}`;\n// let mergedCount = 0;\n// try {\n\
          //   const merged = await github.rest.search.issuesAndPullRequests({\n//\
          \     q: mergedQuery,\n//     per_page: 1,\n//   });\n//   mergedCount =\
          \ merged?.data?.total_count ?? 0;\n// } catch (error) {\n//   if (error?.status\
          \ !== 422) {\n//     throw error;\n//   }\n//   core.warning(`Skipping merged\
          \ search for ${login}; treating as 0.`);\n// }\n//\n// if (mergedCount >=\
          \ experiencedThreshold) {\n//   await github.rest.issues.addLabels({\n//\
          \     ...context.repo,\n//     issue_number: context.payload.issue.number,\n\
          //     labels: [experiencedLabel],\n//   });\n//   return;\n// }\n//\n//\
          \ if (mergedCount >= trustedThreshold) {\n//   await github.rest.issues.addLabels({\n\
          //     ...context.repo,\n//     issue_number: context.payload.issue.number,\n\
          //     labels: [trustedLabel],\n//   });\n// }\n"
'on':
  workflow_dispatch: null
