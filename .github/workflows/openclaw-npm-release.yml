name: OpenClaw NPM Release
true:
  push:
    tags:
    - v*
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish (for example v2026.3.14, v2026.3.14-beta.1,
          or fallback v2026.3.14-1)
        required: true
        type: string
concurrency:
  group: openclaw-npm-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag
    || github.ref }}
  cancel-in-progress: false
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_VERSION: 24.x
  PNPM_VERSION: 10.23.0
jobs:
  preview_openclaw_npm:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Setup Node environment
      uses: ./.github/actions/setup-node-env
      with:
        node-version: ${{ env.NODE_VERSION }}
        pnpm-version: ${{ env.PNPM_VERSION }}
        install-bun: 'false'
        use-sticky-disk: 'false'
    - name: Print release plan
      env:
        RELEASE_TAG: ${{ github.ref_name }}
      run: "set -euo pipefail\nRELEASE_SHA=$(git rev-parse HEAD)\nPACKAGE_VERSION=$(node\
        \ -p \"require('./package.json').version\")\nif [[ \"${RELEASE_TAG}\" =~ ^v[0-9]{4}\\\
        .[1-9][0-9]*\\.[1-9][0-9]*-[1-9][0-9]*$ ]]; then\n  TAG_KIND=\"fallback correction\"\
        \nelse\n  TAG_KIND=\"standard\"\nfi\necho \"Release plan for ${RELEASE_TAG}:\"\
        \necho \"Resolved release SHA: ${RELEASE_SHA}\"\necho \"Resolved package version:\
        \ ${PACKAGE_VERSION}\"\necho \"Resolved tag kind: ${TAG_KIND}\"\nif [[ \"\
        ${TAG_KIND}\" == \"fallback correction\" ]]; then\n  echo \"Correction tag\
        \ note: npm version remains ${PACKAGE_VERSION}\"\nfi\necho \"Would run: git\
        \ fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main\"\necho\
        \ \"Would run with env: RELEASE_SHA=${RELEASE_SHA} RELEASE_TAG=${RELEASE_TAG}\
        \ RELEASE_MAIN_REF=origin/main pnpm release:openclaw:npm:check\"\necho \"\
        Would run: npm view openclaw@${PACKAGE_VERSION} version\"\necho \"Would run:\
        \ pnpm check\"\necho \"Would run: pnpm build\"\necho \"Would run: pnpm release:check\"\
        \n"
    - name: Validate release tag and package metadata
      env:
        RELEASE_TAG: ${{ github.ref_name }}
        RELEASE_MAIN_REF: origin/main
      run: 'set -euxo pipefail

        RELEASE_SHA=$(git rev-parse HEAD)

        export RELEASE_SHA RELEASE_TAG RELEASE_MAIN_REF

        # Fetch the full main ref so merge-base ancestry checks keep working

        # for older tagged commits that are still contained in main.

        git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main

        pnpm release:openclaw:npm:check

        '
    - name: Ensure version is not already published
      env:
        RELEASE_TAG: ${{ github.ref_name }}
      run: "set -euxo pipefail\nPACKAGE_VERSION=$(node -p \"require('./package.json').version\"\
        )\nIS_CORRECTION_TAG=0\nif [[ \"${RELEASE_TAG}\" =~ ^v[0-9]{4}\\.[1-9][0-9]*\\\
        .[1-9][0-9]*-[1-9][0-9]*$ ]]; then\n  IS_CORRECTION_TAG=1\nfi\n\nif npm view\
        \ \"openclaw@${PACKAGE_VERSION}\" version >/dev/null 2>&1; then\n  if [[ \"\
        ${IS_CORRECTION_TAG}\" == \"1\" ]]; then\n    echo \"openclaw@${PACKAGE_VERSION}\
        \ is already published on npm.\"\n    echo \"Correction tag ${RELEASE_TAG}\
        \ is allowed as a fallback release tag, so preview will continue without treating\
        \ this as an error.\"\n    exit 0\n  fi\n  echo \"openclaw@${PACKAGE_VERSION}\
        \ is already published on npm.\"\n  exit 1\nfi\n\nif [[ \"${IS_CORRECTION_TAG}\"\
        \ == \"1\" ]]; then\n  echo \"Previewing fallback correction tag ${RELEASE_TAG}\
        \ for npm version openclaw@${PACKAGE_VERSION}\"\nelse\n  echo \"Previewing\
        \ openclaw@${PACKAGE_VERSION}\"\nfi\n"
    - name: Check
      run: 'set -euxo pipefail

        pnpm check

        '
    - name: Build
      run: 'set -euxo pipefail

        pnpm build

        '
    - name: Verify release contents
      run: 'set -euxo pipefail

        pnpm release:check

        '
    - name: Preview publish command
      run: bash scripts/openclaw-npm-publish.sh --dry-run
  publish_openclaw_npm:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: npm-release
    permissions:
      contents: read
      id-token: write
    steps:
    - name: Validate tag input format
      env:
        RELEASE_TAG: ${{ inputs.tag }}
      run: "set -euo pipefail\nif [[ ! \"${RELEASE_TAG}\" =~ ^v[0-9]{4}\\.[1-9][0-9]*\\\
        .[1-9][0-9]*((-beta\\.[1-9][0-9]*)|(-[1-9][0-9]*))?$ ]]; then\n  echo \"Invalid\
        \ release tag format: ${RELEASE_TAG}\"\n  exit 1\nfi\n"
    - name: Checkout
      uses: actions/checkout@v6
      with:
        ref: refs/tags/${{ inputs.tag }}
        fetch-depth: 0
    - name: Setup Node environment
      uses: ./.github/actions/setup-node-env
      with:
        node-version: ${{ env.NODE_VERSION }}
        pnpm-version: ${{ env.PNPM_VERSION }}
        install-bun: 'false'
        use-sticky-disk: 'false'
    - name: Validate release tag and package metadata
      env:
        RELEASE_TAG: ${{ inputs.tag }}
        RELEASE_MAIN_REF: origin/main
      run: 'set -euo pipefail

        RELEASE_SHA=$(git rev-parse HEAD)

        export RELEASE_SHA RELEASE_TAG RELEASE_MAIN_REF

        # Fetch the full main ref so merge-base ancestry checks keep working

        # for older tagged commits that are still contained in main.

        git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main

        pnpm release:openclaw:npm:check

        '
    - name: Ensure version is not already published
      run: "set -euo pipefail\nPACKAGE_VERSION=$(node -p \"require('./package.json').version\"\
        )\n\nif npm view \"openclaw@${PACKAGE_VERSION}\" version >/dev/null 2>&1;\
        \ then\n  echo \"openclaw@${PACKAGE_VERSION} is already published on npm.\"\
        \n  exit 1\nfi\n\necho \"Publishing openclaw@${PACKAGE_VERSION}\"\n"
    - name: Check
      run: pnpm check
    - name: Build
      run: pnpm build
    - name: Verify release contents
      run: pnpm release:check
    - name: Publish
      run: bash scripts/openclaw-npm-publish.sh --publish
'on':
  workflow_dispatch: null
