name: Stale
true:
  schedule:
  - cron: 17 3 * * *
  workflow_dispatch: null
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
permissions: {}
jobs:
  stale:
    permissions:
      issues: write
      pull-requests: write
    runs-on: blacksmith-16vcpu-ubuntu-2404
    steps:
    - uses: actions/create-github-app-token@v2
      id: app-token
      continue-on-error: true
      with:
        app-id: '2729701'
        private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
    - uses: actions/create-github-app-token@v2
      id: app-token-fallback
      continue-on-error: true
      with:
        app-id: '2971289'
        private-key: ${{ secrets.GH_APP_PRIVATE_KEY_FALLBACK }}
    - name: Mark stale issues and pull requests (primary)
      id: stale-primary
      continue-on-error: true
      uses: actions/stale@v10
      with:
        repo-token: ${{ steps.app-token.outputs.token || steps.app-token-fallback.outputs.token
          }}
        days-before-issue-stale: 7
        days-before-issue-close: 5
        days-before-pr-stale: 5
        days-before-pr-close: 3
        stale-issue-label: stale
        stale-pr-label: stale
        exempt-issue-labels: enhancement,maintainer,pinned,security,no-stale
        exempt-pr-labels: maintainer,no-stale
        operations-per-run: 2000
        ascending: true
        exempt-all-assignees: true
        remove-stale-when-updated: true
        stale-issue-message: 'This issue has been automatically marked as stale due
          to inactivity.

          Please add updates or it will be closed.

          '
        stale-pr-message: 'This pull request has been automatically marked as stale
          due to inactivity.

          Please add updates or it will be closed.

          '
        close-issue-message: 'Closing due to inactivity.

          If this is still an issue, please retry on the latest OpenClaw release and
          share updated details.

          If you are absolutely sure it still happens on the latest release, open
          a new issue with fresh repro steps.

          '
        close-issue-reason: not_planned
        close-pr-message: 'Closing due to inactivity.

          If you believe this PR should be revived, post in #pr-thunderdome-dangerzone
          on Discord to talk to a maintainer.

          That channel is the escape hatch for high-quality PRs that get auto-closed.

          '
    - name: Check stale state cache
      id: stale-state
      if: always()
      uses: actions/github-script@v8
      with:
        github-token: ${{ steps.app-token-fallback.outputs.token || steps.app-token.outputs.token
          }}
        script: "const cacheKey = \"_state\";\nconst { owner, repo } = context.repo;\n\
          \ntry {\n  const { data } = await github.rest.actions.getActionsCacheList({\n\
          \    owner,\n    repo,\n    key: cacheKey,\n  });\n  const caches = data.actions_caches\
          \ ?? [];\n  const hasState = caches.some(cache => cache.key === cacheKey);\n\
          \  core.setOutput(\"has_state\", hasState ? \"true\" : \"false\");\n} catch\
          \ (error) {\n  const message = error instanceof Error ? error.message :\
          \ String(error);\n  core.warning(`Failed to check stale state cache: ${message}`);\n\
          \  core.setOutput(\"has_state\", \"false\");\n}\n"
    - name: Mark stale issues and pull requests (fallback)
      if: (steps.stale-primary.outcome == 'failure' || steps.stale-state.outputs.has_state
        == 'true') && steps.app-token-fallback.outputs.token != ''
      uses: actions/stale@v10
      with:
        repo-token: ${{ steps.app-token-fallback.outputs.token }}
        days-before-issue-stale: 7
        days-before-issue-close: 5
        days-before-pr-stale: 5
        days-before-pr-close: 3
        stale-issue-label: stale
        stale-pr-label: stale
        exempt-issue-labels: enhancement,maintainer,pinned,security,no-stale
        exempt-pr-labels: maintainer,no-stale
        operations-per-run: 2000
        ascending: true
        exempt-all-assignees: true
        remove-stale-when-updated: true
        stale-issue-message: 'This issue has been automatically marked as stale due
          to inactivity.

          Please add updates or it will be closed.

          '
        stale-pr-message: 'This pull request has been automatically marked as stale
          due to inactivity.

          Please add updates or it will be closed.

          '
        close-issue-message: 'Closing due to inactivity.

          If this is still an issue, please retry on the latest OpenClaw release and
          share updated details.

          If you are absolutely sure it still happens on the latest release, open
          a new issue with fresh repro steps.

          '
        close-issue-reason: not_planned
        close-pr-message: 'Closing due to inactivity.

          If you believe this PR should be revived, post in #pr-thunderdome-dangerzone
          on Discord to talk to a maintainer.

          That channel is the escape hatch for high-quality PRs that get auto-closed.

          '
  lock-closed-issues:
    permissions:
      issues: write
    runs-on: blacksmith-16vcpu-ubuntu-2404
    steps:
    - uses: actions/create-github-app-token@v2
      id: app-token
      with:
        app-id: '2729701'
        private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
    - name: Lock closed issues after 48h of no comments
      uses: actions/github-script@v8
      with:
        github-token: ${{ steps.app-token.outputs.token }}
        script: "const lockAfterHours = 48;\nconst lockAfterMs = lockAfterHours *\
          \ 60 * 60 * 1000;\nconst perPage = 100;\nconst cutoffMs = Date.now() - lockAfterMs;\n\
          const { owner, repo } = context.repo;\n\nlet locked = 0;\nlet inspected\
          \ = 0;\n\nlet page = 1;\nwhile (true) {\n  const { data: issues } = await\
          \ github.rest.issues.listForRepo({\n    owner,\n    repo,\n    state: \"\
          closed\",\n    sort: \"updated\",\n    direction: \"desc\",\n    per_page:\
          \ perPage,\n    page,\n  });\n\n  if (issues.length === 0) {\n    break;\n\
          \  }\n\n  for (const issue of issues) {\n    if (issue.pull_request) {\n\
          \      continue;\n    }\n    if (issue.locked) {\n      continue;\n    }\n\
          \    if (!issue.closed_at) {\n      continue;\n    }\n\n    inspected +=\
          \ 1;\n    const closedAtMs = Date.parse(issue.closed_at);\n    if (!Number.isFinite(closedAtMs))\
          \ {\n      continue;\n    }\n    if (closedAtMs > cutoffMs) {\n      continue;\n\
          \    }\n\n    let lastCommentMs = 0;\n    if (issue.comments > 0) {\n  \
          \    const { data: comments } = await github.rest.issues.listComments({\n\
          \        owner,\n        repo,\n        issue_number: issue.number,\n  \
          \      per_page: 1,\n        page: 1,\n        sort: \"created\",\n    \
          \    direction: \"desc\",\n      });\n\n      if (comments.length > 0) {\n\
          \        lastCommentMs = Date.parse(comments[0].created_at);\n      }\n\
          \    }\n\n    const lastActivityMs = Math.max(closedAtMs, lastCommentMs\
          \ || 0);\n    if (lastActivityMs > cutoffMs) {\n      continue;\n    }\n\
          \n    await github.rest.issues.lock({\n      owner,\n      repo,\n     \
          \ issue_number: issue.number,\n      lock_reason: \"resolved\",\n    });\n\
          \n    locked += 1;\n  }\n\n  page += 1;\n}\n\ncore.info(`Inspected ${inspected}\
          \ closed issues; locked ${locked}.`);\n"
'on':
  workflow_dispatch: null
